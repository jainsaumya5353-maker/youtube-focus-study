<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Mode Active — YouTube Focus Study Player</title>
  <link rel="stylesheet" href="blocked.css">
</head>

<body>
  <div class="container">
    <div class="pulse-ring"></div>
    <div class="icon-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon">
        <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z" />
        <path d="M9 12l2 2 4-4" />
      </svg>
    </div>
    <h1>🎯 Focus Mode Active</h1>
    <p class="subtitle">You're in a study session right now. Stay on track!</p>
    <p class="detail">This page was blocked because it's not part of your current focus session. Return to your Study
      Player to continue studying.</p>
    <button id="return-btn">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m15 18-6-6 6-6" />
      </svg>
      Go Back to Focus Player
    </button>
  </div>
</body>
<script src="blocked.js"></script>

</html>
