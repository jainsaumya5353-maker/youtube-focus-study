<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Focus Study Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 300px;
            min-height: 180px;
            background: linear-gradient(145deg, #0f172a, #1a1033);
            color: #f1f5f9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(139, 92, 246, 0.15);
        }

        .header img {
            width: 28px;
            height: 28px;
            border-radius: 6px;
        }

        .header h1 {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .status-card {
            background: rgba(31, 41, 55, 0.5);
            border: 1px solid rgba(55, 65, 81, 0.4);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 14px;
        }

        .status-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #6b7280;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .status-value {
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .status-dot.active {
            background: #22c55e;
            box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
            animation: blink 2s ease-in-out infinite;
        }

        .status-dot.inactive {
            background: #6b7280;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        .media-info {
            font-size: 11px;
            color: #9ca3af;
            margin-top: 6px;
            padding-left: 16px;
        }

        .open-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            background: linear-gradient(135deg, #7c3aed, #8b5cf6);
            color: white;
            border: none;
            padding: 10px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px -2px rgba(124, 58, 237, 0.3);
        }

        .open-btn:hover {
            filter: brightness(1.15);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px -2px rgba(124, 58, 237, 0.45);
        }

        .open-btn svg {
            flex-shrink: 0;
        }
    </style>
</head>

<body>
    <div class="header">
        <img src="icons/icon48.png" alt="icon">
        <h1>YouTube Focus Study Player</h1>
    </div>

    <div class="status-card">
        <div class="status-label">Session Status</div>
        <div class="status-value">
            <span class="status-dot inactive" id="status-dot"></span>
            <span id="status-text">Inactive</span>
        </div>
        <div class="media-info" id="media-info" style="display: none;"></div>
    </div>

    <button class="open-btn" id="open-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
            <polyline points="15 3 21 3 21 9" />
            <line x1="10" y1="14" x2="21" y2="3" />
        </svg>
        Open Focus Player
    </button>

    <script src="popup.js"></script>
</body>

</html>
